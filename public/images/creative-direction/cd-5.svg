<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <rect width="800" height="600" fill="#080808"/>
  <defs>
    <linearGradient id="g5" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff6a00" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#080808" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#g5)"/>
  <!-- horizontal scan lines -->
  <line x1="0" y1="100" x2="800" y2="100" stroke="#ffffff" stroke-width="0.3" opacity="0.05"/>
  <line x1="0" y1="200" x2="800" y2="200" stroke="#ffffff" stroke-width="0.3" opacity="0.05"/>
  <line x1="0" y1="400" x2="800" y2="400" stroke="#ffffff" stroke-width="0.3" opacity="0.05"/>
  <line x1="0" y1="500" x2="800" y2="500" stroke="#ffffff" stroke-width="0.3" opacity="0.05"/>
  <!-- right accent block -->
  <rect x="660" y="0" width="140" height="600" fill="#ff6a00" opacity="0.04"/>
  <rect x="658" y="0" width="2" height="600" fill="#ff6a00" opacity="0.35"/>
  <!-- top label -->
  <text x="60" y="100" font-family="Arial" font-size="12" fill="#ff6a00" opacity="0.7" letter-spacing="7">IMMERSIVE</text>
  <!-- big text -->
  <text x="55" y="260" font-family="Arial" font-size="100" font-weight="900" fill="#ffffff" opacity="0.9" letter-spacing="-4">ART</text>
  <text x="55" y="365" font-family="Arial" font-size="100" font-weight="900" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.4" letter-spacing="-4">INSTALL</text>
  <rect x="60" y="390" width="420" height="2" fill="#ff6a00" opacity="0.6"/>
  <text x="60" y="420" font-family="Arial" font-size="13" fill="#ffffff" opacity="0.28" letter-spacing="5">CREATIVE DIRECTION — 05</text>
  <!-- corner dot -->
  <circle cx="700" cy="520" r="40" fill="#ff6a00" opacity="0.12"/>
  <circle cx="700" cy="520" r="6" fill="#ff6a00" opacity="0.6"/>
</svg>
