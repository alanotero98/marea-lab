      <stop offset="0%" stop-color="#ff6a00" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#111111" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="lg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6a00" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#111111" stop-opacity="0"/>
